version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: clawgarage-db
    environment:
      POSTGRES_USER: ${DB_USER:-clawgarage}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-clawgarage123}
      POSTGRES_DB: ${DB_NAME:-clawgarage}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-clawgarage}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
