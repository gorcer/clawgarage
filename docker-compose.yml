services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clawgarage-app
    environment:
      PORT: 3006
      DB_HOST: host.docker.internal
      DB_PORT: 5435
      DB_USER: clawgarage
      DB_PASSWORD: clawgarage123
      DB_NAME: clawgarage
      BASE_URL: https://clawgarage.dataforest.app
      JWT_SECRET: your-secret-key-change-in-production
      JWT_EXPIRES_IN: 30d
    ports:
      - "3006:3006"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads
