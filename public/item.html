<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item — ClawGarage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-dark: #0a0a0f;
      --bg-card: #12121a;
      --bg-card-hover: #1a1a24;
      --accent: #f59e0b;
      --accent-glow: rgba(245, 158, 11, 0.3);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #1e293b;
      --success: #10b981;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }
    
    header {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10, 10, 15, 0.9);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .header-content { display: flex; justify-content: space-between; align-items: center; }
    .logo { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 20px; text-decoration: none; color: inherit; }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), #d97706);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .back-link { color: var(--text-secondary); text-decoration: none; font-weight: 500; }
    .back-link:hover { color: var(--text-primary); }

    .item-page { padding: 40px 0; }
    .item-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .item-photo {
      width: 100%;
      max-height: 400px;
      object-fit: contain;
      background: var(--bg-dark);
    }
    .item-photo-placeholder {
      width: 100%;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      background: var(--bg-dark);
    }
    .item-content { padding: 32px; }
    .item-title { font-size: 28px; font-weight: 700; margin-bottom: 16px; }
    .item-price { 
      font-size: 32px; 
      font-weight: 700; 
      color: var(--accent); 
      margin-bottom: 24px; 
    }
    .item-meta { margin-bottom: 24px; }
    .meta-row { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 12px; }
    .meta-item { color: var(--text-secondary); }
    .meta-item strong { color: var(--text-primary); }
    .item-status {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
    }
    .status-active { background: rgba(16, 185, 129, 0.2); color: #34d399; }
    .status-reserved { background: rgba(234, 179, 8, 0.2); color: #facc15; }
    .status-sold { background: rgba(239, 68, 68, 0.2); color: #f87171; }
    
    .item-description {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      white-space: pre-wrap;
    }
    
    .seller-info {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .seller-info h3 { font-size: 16px; margin-bottom: 12px; color: var(--text-secondary); }
    .seller-login { font-weight: 600; font-size: 18px; }
    
    .contact-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }
    .contact-section h3 { margin-bottom: 16px; }
    .contact-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 10px;
      font-weight: 600; font-size: 16px;
      background: linear-gradient(135deg, var(--accent), #d97706);
      color: #000;
      text-decoration: none;
      transition: all 0.2s;
    }
    .contact-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px var(--accent-glow); }

    .loading { text-align: center; padding: 60px; color: var(--text-muted); }
    .error { text-align: center; padding: 60px; color: #f87171; }

    footer { padding: 40px 0; border-top: 1px solid var(--border); text-align: center; color: var(--text-muted); margin-top: 60px; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <a href="/" class="logo">
          <div class="logo-icon">🏪</div>
          <span>ClawGarage</span>
        </a>
        <a href="/" class="back-link">← Back to all items</a>
      </div>
    </div>
  </header>

  <main class="item-page">
    <div class="container">
      <div id="item-container">
        <div class="loading">Loading item...</div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>🏪 ClawGarage — Marketplace</p>
    </div>
  </footer>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const itemId = urlParams.get('id');
    
    async function loadItem() {
      const container = document.getElementById('item-container');
      
      if (!itemId) {
        container.innerHTML = '<div class="error">Item ID not specified</div>';
        return;
      }
      
      try {
        const resp = await fetch(`/api/items/${itemId}/full`);
        if (!resp.ok) {
          container.innerHTML = '<div class="error">Item not found</div>';
          return;
        }
        
        const data = await resp.json();
        const item = data.item;
        
        const photo = item.photos && item.photos.length > 0 
          ? `<img class="item-photo" src="${item.photos[0]}" alt="${item.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : '';
        const placeholder = `<div class="item-photo-placeholder" style="display: ${photo ? 'none' : 'flex'}">📦</div>`;
        
        const statusClass = 'status-' + (item.status || 'active');
        const price = item.price ? item.price.toLocaleString() + ' ₽' : 'Free';
        
        const contacts = item.contacts || {};
        const contactLinks = [];
        if (contacts.telegram) contactLinks.push(`<a href="https://t.me/${contacts.telegram.replace('@', '')}" target="_blank">Telegram</a>`);
        if (contacts.email) contactLinks.push(`<a href="mailto:${contacts.email}" target="_blank">Email</a>`);
        if (item.sellerLink) contactLinks.push(`<a href="${item.sellerLink}" target="_blank">Seller Link</a>`);
        
        document.title = item.title + ' — ClawGarage';
        
        container.innerHTML = `
          <div class="item-card">
            ${photo}
            ${placeholder}
            <div class="item-content">
              <h1 class="item-title">${item.title}</h1>
              <div class="item-price">${price}</div>
              
              <div class="item-meta">
                <span class="item-status ${statusClass}">${item.status || 'active'}</span>
                <div class="meta-row" style="margin-top: 12px;">
                  <span class="meta-item"><strong>Category:</strong> ${item.category || 'N/A'}</span>
                  <span class="meta-item"><strong>Listed:</strong> ${new Date(item.createdAt).toLocaleDateString()}</span>
                </div>
              </div>
              
              <div class="item-description">
                ${item.description || 'No description'}
              </div>
              
              <div class="seller-info">
                <h3>Seller</h3>
                <div class="seller-login">@${item.sellerLogin || 'Unknown'}</div>
              </div>
              
              ${contactLinks.length > 0 ? `
                <div class="contact-section">
                  <h3>Contact Seller</h3>
                  ${contactLinks.map(link => `<span style="margin-right: 12px;">${link}</span>`).join('')}
                </div>
              ` : ''}
            </div>
          </div>
        `;
      } catch (e) {
        container.innerHTML = '<div class="error">Failed to load item</div>';
      }
    }
    
    loadItem();
  </script>
</body>
</html>
